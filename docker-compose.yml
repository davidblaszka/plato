services:
  api:
    build: ./backend
    container_name: plato_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live reload — edit code, changes apply instantly
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: plato_db
    ports:
      - "5432:5432"             # exposed so you can connect with any Postgres client
    environment:
      POSTGRES_USER: plato
      POSTGRES_PASSWORD: plato
      POSTGRES_DB: plato
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plato"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: plato_adminer
    ports:
      - "8080:8080"             # open localhost:8080 to browse your database visually
    depends_on:
      - db

volumes:
  postgres_data:
